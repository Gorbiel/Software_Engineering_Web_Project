name: CI

on:
  push:
    branches: ["main", "master", "dev"]
  pull_request:
    branches: ["main", "master", "dev"]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
      workflows: ${{ steps.filter.outputs.workflows }}
      infra: ${{ steps.filter.outputs.infra }}

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - "backend/**"
              - ".github/workflows/ci.yml"
            frontend:
              - "frontend/**"
              - ".github/workflows/ci.yml"
            docker:
              - "compose.yaml"
              - "compose.yml"
              - "**/Dockerfile"
              - "**/Dockerfile.*"
              - ".github/workflows/ci.yml"
            workflows:
              - ".github/workflows/**"
            infra:
              - "infra/**"
              - ".github/workflows/ci.yml"

  backend:
    name: Backend lint and test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'

    permissions:
      contents: read

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint
        run: ruff check .

      - name: Verify formatting
        run: black --check .

      - name: Test
        run: pytest

  frontend:
    name: Frontend lint, typecheck and build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'

    permissions:
      contents: read

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Build
        run: npm run build

  docker:
    name: Docker Compose build
    runs-on: ubuntu-latest
    needs: [changes, backend, frontend]
    if: |
      always() &&
      (
        needs.changes.outputs.docker == 'true' ||
        needs.changes.outputs.backend == 'true' ||
        needs.changes.outputs.frontend == 'true'
      )

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Compose config
        run: docker compose -f compose.yaml config

      - name: Build services
        run: docker compose -f compose.yaml build

  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [changes, backend, frontend, docker]
    if: always()

    permissions:
      contents: read

    steps:
      - name: Check CI result
        run: |
          if [[ "${{ needs.backend.result }}" == "failure" || \
                "${{ needs.frontend.result }}" == "failure" || \
                "${{ needs.docker.result }}" == "failure" || \
                "${{ needs.backend.result }}" == "cancelled" || \
                "${{ needs.frontend.result }}" == "cancelled" || \
                "${{ needs.docker.result }}" == "cancelled" ]]; then
            echo "One or more required CI jobs failed or were cancelled."
            exit 1
          fi

          echo "CI passed."