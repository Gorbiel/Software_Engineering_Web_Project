version: 2

updates:
  # Backend (Python / Django)
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend
    commit-message:
      prefix: "deps(backend)"
    groups:
      django:
        patterns:
          - "django*"
      testing:
        patterns:
          - "pytest*"
          - "coverage*"

  # Frontend (Next.js / npm)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: "deps(frontend)"
    groups:
      nextjs:
        patterns:
          - "next"
          - "react"
          - "react-dom"
      linting:
        patterns:
          - "eslint*"
          - "@typescript-eslint/*"

  # Docker (Dockerfiles + compose)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - infra
    commit-message:
      prefix: "deps(docker)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "deps(ci)"