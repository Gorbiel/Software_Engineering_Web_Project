apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: glazedin-production
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Gorbiel/Software_Engineering_Web_Project.git
    targetRevision: main
    path: k8s/overlays/production

  destination:
    server: https://kubernetes.default.svc
    namespace: production

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
